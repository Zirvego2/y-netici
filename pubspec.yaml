name: zirvego_main_app
description: ZirveGo Main Panel Admin Mobil Uygulaması
publish_to: 'none'
version: 1.0.0+2

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  
  # Firebase
  firebase_core: ^2.24.2
  cloud_firestore: ^4.13.6
  firebase_auth: ^4.15.3
  
  # State Management
  provider: ^6.1.1
  
  # UI & Utilities
  cupertino_icons: ^1.0.6
  google_fonts: ^6.1.0
  flutter_svg: ^2.0.9
  shared_preferences: ^2.2.2
  intl: ^0.20.2
  
  # Form Validation
  email_validator: ^2.1.17
  
  # Maps
  google_maps_flutter: ^2.5.0
  
  # Notifications
  flutter_local_notifications: ^17.2.2
  firebase_messaging: ^14.7.10
  
  # Image processing
  image: ^4.0.17

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  flutter_launcher_icons: ^0.13.1

flutter:
  uses-material-design: true
  
  assets:
    - assets/images/
    - assets/icons/
    - assets/markers/

flutter_launcher_icons:
  android: true
  ios: false
  image_path: "app-icon2.png"
  # Adaptive icon kapatıldı - tam boyut ikon için
  # adaptive_icon_background: "#2196F3"
  # adaptive_icon_foreground: "app-icon2.png"
  remove_alpha_ios: true