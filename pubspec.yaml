name: zirvego_main_app
description: ZirveGo Main Panel Admin Mobil Uygulaması
publish_to: 'none'
version: 1.1.1+49

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  
  # Firebase
  # Align with the known-working `zirvego-app` Firebase major versions (v3/v5/v15)
  # to avoid older iOS gRPC/BoringSSL toolchain issues (e.g. `-G`).
  firebase_core: ^3.8.1
  cloud_firestore: ^5.5.2
  firebase_auth: ^5.3.2
  
  # State Management
  provider: ^6.1.1
  
  # UI & Utilities
  cupertino_icons: ^1.0.6
  google_fonts: ^6.1.0
  flutter_svg: ^2.0.9
  shared_preferences: ^2.2.2
  # NOTE: Flutter SDK (flutter_localizations) pins intl; version can differ by Flutter release.
  # Use a compatible range so `flutter pub get` succeeds across Flutter versions (0.19.x or 0.20.x).
  intl: '>=0.19.0 <0.21.0'
  
  # Form Validation
  email_validator: ^2.1.17
  
  # Maps
  google_maps_flutter: ^2.5.0
  
  # Notifications
  flutter_local_notifications: ^17.2.2
  firebase_messaging: ^15.1.5
  
  # Image processing
  image: ^4.0.17

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  flutter_launcher_icons: ^0.13.1

flutter:
  uses-material-design: true
  
  assets:
    - assets/images/
    - assets/icons/
    - assets/markers/

flutter_launcher_icons:
  android: true
  ios: false
  image_path: "app-icon2.png"
  # Adaptive icon kapatıldı - tam boyut ikon için
  # adaptive_icon_background: "#2196F3"
  # adaptive_icon_foreground: "app-icon2.png"
  remove_alpha_ios: true
