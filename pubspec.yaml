name: zirvego_main_app
description: ZirveGo Main Panel Admin Mobil Uygulaması
publish_to: 'none'
version: 1.1.1+61

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # 🔥 FIREBASE (stabil kombin)
  firebase_core: ^3.8.1
  cloud_firestore: ^5.5.2
  firebase_auth: ^5.3.2
  firebase_messaging: ^15.1.5

  # 🔥 STATE
  provider: ^6.1.1

  # 🔥 UI
  cupertino_icons: ^1.0.6
  google_fonts: ^6.1.0
  flutter_svg: ^2.0.9

  # 🔥 STORAGE
  shared_preferences: ^2.2.2

  # 🔥 DATE / FORMAT
  intl: '>=0.19.0 <0.21.0'

  # 🔥 VALIDATION
  email_validator: ^2.1.17

  # 🔥 MAPS
  google_maps_flutter: ^2.5.0

  # 🔥 NOTIFICATIONS
  flutter_local_notifications: ^17.2.2

  # 🔥 IMAGE
  image: ^4.0.17

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  flutter_launcher_icons: ^0.13.1

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/
    - assets/markers/

flutter_launcher_icons:
  android: true
  ios: false
  image_path: "app-icon2.png"
  remove_alpha_ios: true
