workflows:
  ios-workflow:
    name: iOS Workflow
    max_build_duration: 120
    instance_type: mac_mini_m1
    environment:
      flutter: "3.22.0"
      # IMPORTANT: "latest" kullanmayın. Codemagic hesabınızda mevcut olan bir Xcode sürümüne pinleyin.
      # Örn: "16.4" / "16.2" / "15.4" (hangisi Codemagic UI'da görünüyorsa onu yazın)
      xcode: "16.4"
      cocoapods: default
    scripts:
      - name: Tool versions
        script: |
          flutter --version
          flutter doctor -v
          xcodebuild -version
          pod --version
      - name: Clean project
        script: |
          flutter clean
          rm -rf build
          rm -rf ~/Library/Developer/Xcode/DerivedData/*
          cd ios
          rm -rf Pods Podfile.lock .symlinks
          pod deintegrate || true
          pod cache clean --all || true
          cd ..
      - name: Get Flutter packages
        script: |
          flutter pub get
      - name: Install pods
        script: |
          cd ios
          pod repo update
          pod install --repo-update
          cd ..
      - name: Diagnose -G flag
        script: |
          echo "Searching for -G in Pods project..."
          if [ -f "ios/Pods/Pods.xcodeproj/project.pbxproj" ]; then
            grep -n "\\-G" ios/Pods/Pods.xcodeproj/project.pbxproj || echo "No -G flag found in Pods project"
          else
            echo "Pods project not found"
          fi
      - name: Build unsigned IPA
        script: |
          export ENABLE_BITCODE=NO
          export GCC_GENERATE_DEBUGGING_SYMBOLS=NO
          export DEBUG_INFORMATION_FORMAT=dwarf
          flutter build ipa --release --no-codesign --build-number=$CM_BUILD_NUMBER
    artifacts:
      - build/ios/ipa/*.ipa
    publishing:
      email:
        recipients:
          - oksuzali60@gmail.com
        notify:
          success: true
          failure: true
