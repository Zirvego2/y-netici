workflows:
  ios-workflow:
    name: iOS Workflow
    max_build_duration: 120
    instance_type: mac_mini_m1
    environment:
      flutter: "3.22.0"
      # IMPORTANT: "latest" kullanmayın. Codemagic hesabınızda mevcut olan bir Xcode sürümüne pinleyin.
      # NOT: "15.4" sizin Codemagic imajınızda yoksa "Unsupported Xcode version" hatası alırsınız.
      # Codemagic UI'da hangi Xcode sürümleri listeleniyorsa onlardan birini yazın.
      # Şimdilik en yaygın desteklenen sürümlerden birine pinliyoruz:
      xcode: "16.2"
      cocoapods: default
      groups:
        - app_store_credentials
    scripts:
      - name: Tool versions
        script: |
          flutter --version
          flutter doctor -v
          xcodebuild -version
          pod --version
      - name: Clean project
        script: |
          flutter clean
          rm -rf build
          rm -rf ~/Library/Developer/Xcode/DerivedData/*
          cd ios
          rm -rf Pods Podfile.lock .symlinks
          pod deintegrate || true
          pod cache clean --all || true
          cd ..
      - name: Get Flutter packages
        script: |
          flutter pub get
      - name: Sync iOS project files with current Flutter SDK
        script: |
          # Prevent "Upgrading Podfile" surprises by syncing templates to the Flutter SDK used on CI.
          flutter create --platforms=ios .
      - name: Install pods
        script: |
          cd ios
          ruby patch_podfile_rg_fix.rb
          pod repo update
          pod install --repo-update
          cd ..
      - name: Verify Podfile + detect -G in Pods project (must be empty)
        script: |
          echo "===== ios/Podfile (first 120 lines) ====="
          sed -n '1,120p' ios/Podfile
          echo "===== Searching for -G in Pods.xcodeproj ====="
          if [ -f "ios/Pods/Pods.xcodeproj/project.pbxproj" ]; then
            # If this prints lines, it shows EXACTLY which pod/target injected -G.
            grep -n "\\-G" ios/Pods/Pods.xcodeproj/project.pbxproj || echo "OK: No -G found in Pods project"
          else
            echo "Pods project not found (pod install may have failed?)"
          fi
      - name: Diagnose -G flag
        script: |
          echo "Searching for *compiler flag* -G (not pod names) ..."
          echo "1) Pods project (may include pod names, not always flags):"
          if [ -f "ios/Pods/Pods.xcodeproj/project.pbxproj" ]; then
            grep -nE '(^|[[:space:]])-G([0-9A-Za-z._-]+)?($|[[:space:]])' ios/Pods/Pods.xcodeproj/project.pbxproj || true
          fi
          echo ""
          echo "2) Target Support Files xcconfigs (MOST LIKELY source):"
          if [ -d "ios/Pods/Target Support Files" ]; then
            grep -RInE '(^|[[:space:]])-G([0-9A-Za-z._-]+)?($|[[:space:]])' "ios/Pods/Target Support Files" || echo "OK: No compiler -G token found in Target Support Files"
          else
            echo "Target Support Files not found"
          fi
          echo ""
          echo "3) Full Pods directory scan for compiler -G token (xcconfig/args/scripts):"
          if [ -d "ios/Pods" ]; then
            grep -RInE '(^|[[:space:]])-G([0-9A-Za-z._-]+)?($|[[:space:]])' ios/Pods \
              --exclude-dir="Headers" \
              --exclude="project.pbxproj" \
              || echo "OK: No compiler -G token found anywhere under ios/Pods"
          else
            echo "ios/Pods not found"
          fi
      - name: Set up code signing (Codemagic profiles)
        script: |
          xcode-project use-profiles
      - name: Build signed IPA (App Store / Ad Hoc)
        script: |
          set -o pipefail
          flutter build ipa --release -v \
            --build-number=$CM_BUILD_NUMBER \
            --export-options-plist /Users/builder/export_options.plist \
            2>&1 | tee flutter_build_ipa.log
    artifacts:
      - build/ios/ipa/*.ipa
      - flutter_build_ipa.log
    publishing:
      email:
        recipients:
          - oksuzali60@gmail.com
        notify:
          success: true
          failure: true
