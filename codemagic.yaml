workflows:
  ios-workflow:
    name: iOS Workflow
    max_build_duration: 120
    instance_type: mac_mini_m1
    environment:
      flutter: "3.22.0"
      # IMPORTANT: "latest" kullanmayın. Codemagic hesabınızda mevcut olan bir Xcode sürümüne pinleyin.
      # NOT: "15.4" sizin Codemagic imajınızda yoksa "Unsupported Xcode version" hatası alırsınız.
      # Codemagic UI'da hangi Xcode sürümleri listeleniyorsa onlardan birini yazın.
      # Şimdilik en yaygın desteklenen sürümlerden birine pinliyoruz:
      xcode: "16.2"
      cocoapods: default
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.zirvego.yonetici
      groups:
        - app_store_credentials
    scripts:
      - name: Tool versions
        script: |
          flutter --version
          flutter doctor -v
          xcodebuild -version
          pod --version
      - name: Clean project
        script: |
          flutter clean
          rm -rf build
          rm -rf ~/Library/Developer/Xcode/DerivedData/*
          cd ios
          rm -rf Pods Podfile.lock .symlinks
          pod deintegrate || true
          pod cache clean --all || true
          cd ..
      - name: Get Flutter packages
        script: |
          flutter pub get
      - name: Verify Podfile integrity
        script: |
          # Ensure Podfile has only one post_install block (flutter create was breaking it)
          if [ -f ios/Podfile ]; then
            post_install_count=$(grep -c "^post_install do" ios/Podfile || echo "0")
            if [ "$post_install_count" != "1" ]; then
              echo "ERROR: Podfile has $post_install_count post_install blocks (expected 1)"
              exit 1
            fi
            echo "OK: Podfile has exactly 1 post_install block"
          fi
      - name: Install pods
        script: |
          cd ios
          # NOTE: patch_podfile_rg_fix.rb kaldırıldı - Podfile'da zaten post_install var ve -G flag stripping yapıyor
          # Bu script duplicate post_install ekliyordu.
          pod repo update
          pod install --repo-update
          cd ..
      - name: Verify Podfile + detect -G in Pods project (must be empty)
        script: |
          echo "===== ios/Podfile (first 120 lines) ====="
          sed -n '1,120p' ios/Podfile
          echo "===== Searching for -G in Pods.xcodeproj ====="
          if [ -f "ios/Pods/Pods.xcodeproj/project.pbxproj" ]; then
            # If this prints lines, it shows EXACTLY which pod/target injected -G.
            grep -n "\\-G" ios/Pods/Pods.xcodeproj/project.pbxproj || echo "OK: No -G found in Pods project"
          else
            echo "Pods project not found (pod install may have failed?)"
          fi
      - name: Diagnose -G flag
        script: |
          echo "Searching for *compiler flag* -G (not pod names) ..."
          echo "1) Pods project (may include pod names, not always flags):"
          if [ -f "ios/Pods/Pods.xcodeproj/project.pbxproj" ]; then
            grep -nE '(^|[[:space:]])-G([0-9A-Za-z._-]+)?($|[[:space:]])' ios/Pods/Pods.xcodeproj/project.pbxproj || true
          fi
          echo ""
          echo "2) Target Support Files xcconfigs (MOST LIKELY source):"
          if [ -d "ios/Pods/Target Support Files" ]; then
            grep -RInE '(^|[[:space:]])-G([0-9A-Za-z._-]+)?($|[[:space:]])' "ios/Pods/Target Support Files" || echo "OK: No compiler -G token found in Target Support Files"
          else
            echo "Target Support Files not found"
          fi
          echo ""
          echo "3) Full Pods directory scan for compiler -G token (xcconfig/args/scripts):"
          if [ -d "ios/Pods" ]; then
            grep -RInE '(^|[[:space:]])-G([0-9A-Za-z._-]+)?($|[[:space:]])' ios/Pods \
              --exclude-dir="Headers" \
              --exclude="project.pbxproj" \
              || echo "OK: No compiler -G token found anywhere under ios/Pods"
          else
            echo "ios/Pods not found"
          fi
      - name: Set up code signing (Codemagic profiles)
        script: |
          # xcode-project use-profiles profiles'ları Xcode projesine uygular ve export_options.plist oluşturur
          xcode-project use-profiles --project ios/Runner.xcodeproj
          
          if [ ! -f "/Users/builder/export_options.plist" ]; then
            echo "ERROR: /Users/builder/export_options.plist not found after xcode-project use-profiles"
            exit 1
          fi
          
          # Keychain'deki certificate'leri kontrol et
          echo "Available certificates in keychain:"
          security find-identity -p codesigning -v | grep "Apple Distribution" || echo "No Apple Distribution certificates found"
          
          # Provisioning profile'ları kontrol et ve certificate ile eşleştir
          echo ""
          echo "Checking provisioning profiles..."
          if [ -d "$HOME/Library/MobileDevice/Provisioning Profiles" ]; then
            for profile in "$HOME/Library/MobileDevice/Provisioning Profiles"/*.mobileprovision; do
              if [ -f "$profile" ]; then
                echo "Profile: $(basename "$profile")"
                # Profile içindeki certificate'leri kontrol et
                security cms -D -i "$profile" 2>/dev/null | grep -A 10 "DeveloperCertificates" | head -5 || true
              fi
            done
          fi
          
          echo ""
          echo "Generated export_options.plist:"
          cat /Users/builder/export_options.plist
      - name: Build signed IPA (App Store / Ad Hoc)
        script: |
          set -o pipefail
          
          # Podfile backup/restore: flutter build ipa sırasında post_install tekrar eklenebiliyor.
          cp ios/Podfile ios/Podfile.backup
          echo "Podfile backed up. Original post_install count: $(grep -c '^post_install do' ios/Podfile || echo '0')"
          
          flutter build ipa --release \
            --build-number=$CM_BUILD_NUMBER \
            --export-options-plist=/Users/builder/export_options.plist \
            2>&1 | tee flutter_build_ipa.log || BUILD_EXIT_CODE=$?
          
          if [ -f ios/Podfile.backup ]; then
            echo "Restoring Podfile from backup..."
            mv ios/Podfile.backup ios/Podfile
            post_install_count=$(grep -c '^post_install do' ios/Podfile || echo '0')
            echo "Podfile restored. post_install count: $post_install_count"
            
            if [ "$post_install_count" != "1" ]; then
              echo "ERROR: Podfile restore failed! Still has $post_install_count post_install blocks"
              cat ios/Podfile
              exit 1
            fi
            
            echo "Running pod install with restored Podfile..."
            cd ios
            pod install
            cd ..
          fi
          
          # Final Podfile integrity kontrolü
          post_install_count=$(grep -c '^post_install do' ios/Podfile || echo '0')
          if [ "$post_install_count" != "1" ]; then
            echo "WARNING: Podfile has $post_install_count post_install blocks after build (expected 1)"
          else
            echo "SUCCESS: Podfile integrity maintained (1 post_install block)"
          fi
          
          # Build başarısız olduysa exit code'u koru
          if [ -n "${BUILD_EXIT_CODE:-}" ]; then
            exit $BUILD_EXIT_CODE
          fi
    artifacts:
      - build/ios/ipa/*.ipa
      - flutter_build_ios.log
      - flutter_build_ipa.log
    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
      email:
        recipients:
          - oksuzali60@gmail.com
        notify:
          success: true
          failure: true
