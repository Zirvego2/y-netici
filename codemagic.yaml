workflows:
  ios-workflow:
    name: iOS Workflow
    max_build_duration: 120
    instance_type: mac_mini_m1
    environment:
      flutter: "3.22.0"
      # IMPORTANT: "latest" kullanmayın. Codemagic hesabınızda mevcut olan bir Xcode sürümüne pinleyin.
      # Örn: "16.4" / "16.2" / "15.4" (hangisi Codemagic UI'da görünüyorsa onu yazın)
      xcode: "16.4"
      cocoapods: default
      groups:
        - app_store_credentials
    scripts:
      - name: Tool versions
        script: |
          flutter --version
          flutter doctor -v
          xcodebuild -version
          pod --version
      - name: Clean project
        script: |
          flutter clean
          rm -rf build
          rm -rf ~/Library/Developer/Xcode/DerivedData/*
          cd ios
          rm -rf Pods Podfile.lock .symlinks
          pod deintegrate || true
          pod cache clean --all || true
          cd ..
      - name: Get Flutter packages
        script: |
          flutter pub get
      - name: Install pods
        script: |
          cd ios
          pod repo update
          pod install --repo-update
          cd ..
      - name: Verify Podfile + detect -G in Pods project (must be empty)
        script: |
          echo "===== ios/Podfile (first 120 lines) ====="
          sed -n '1,120p' ios/Podfile
          echo "===== Searching for -G in Pods.xcodeproj ====="
          if [ -f "ios/Pods/Pods.xcodeproj/project.pbxproj" ]; then
            # If this prints lines, it shows EXACTLY which pod/target injected -G.
            grep -n "\\-G" ios/Pods/Pods.xcodeproj/project.pbxproj || echo "OK: No -G found in Pods project"
          else
            echo "Pods project not found (pod install may have failed?)"
          fi
      - name: Diagnose -G flag
        script: |
          echo "Searching for *compiler flag* -G (not pod names) ..."
          echo "1) Pods project (may include pod names, not always flags):"
          if [ -f "ios/Pods/Pods.xcodeproj/project.pbxproj" ]; then
            grep -nE '(^|[[:space:]])-G([0-9A-Za-z._-]+)?($|[[:space:]])' ios/Pods/Pods.xcodeproj/project.pbxproj || true
          fi
          echo ""
          echo "2) Target Support Files xcconfigs (MOST LIKELY source):"
          if [ -d "ios/Pods/Target Support Files" ]; then
            grep -RInE '(^|[[:space:]])-G([0-9A-Za-z._-]+)?($|[[:space:]])' "ios/Pods/Target Support Files" || echo "OK: No compiler -G token found in Target Support Files"
          else
            echo "Target Support Files not found"
          fi
      - name: Set up code signing (Codemagic profiles)
        script: |
          xcode-project use-profiles
      - name: Build signed IPA (App Store / Ad Hoc)
        script: |
          flutter build ipa --release \
            --build-number=$CM_BUILD_NUMBER \
            --export-options-plist /Users/builder/export_options.plist
    artifacts:
      - build/ios/ipa/*.ipa
    publishing:
      email:
        recipients:
          - oksuzali60@gmail.com
        notify:
          success: true
          failure: true
