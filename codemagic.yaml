workflows:
  ios-workflow:
    name: iOS Workflow
    max_build_duration: 120
    instance_type: mac_mini_m1

    environment:
      flutter: "3.22.0"
      xcode: "16.2"
      cocoapods: default
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.zirvego.yonetici
      groups:
        - app_store_credentials

    scripts:
      - name: Tool versions
        script: |
          flutter --version
          flutter doctor -v
          xcodebuild -version
          pod --version

      - name: Clean project
        script: |
          flutter clean

      - name: Flutter pub get
        script: |
          flutter pub get

      - name: Install pods
        script: |
          cd ios
          pod repo update
          pod install --repo-update
          cd ..

      - name: Set up code signing
        script: |
          xcode-project use-profiles --project ios/Runner.xcodeproj

      - name: Build IPA
        script: |
          flutter build ipa --release \
            --build-number=$CM_BUILD_NUMBER \
            --export-options-plist=/Users/builder/export_options.plist

    artifacts:
      - build/ios/ipa/*.ipa

    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
      email:
        recipients:
          - oksuzali60@gmail.com
        notify:
          success: true
          failure: true
